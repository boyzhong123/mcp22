<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", Roboto, Helvetica, Arial, sans-serif; color: #0f172a; }
  #row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    padding: 14px;
  }
  .card {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 1px 0 rgba(15,23,42,0.02);
    min-height: 84px;
  }
  .icon {
    width: 52px; height: 52px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex: 0 0 auto;
  }
  .i-globe { background: #d1fae5; }
  .i-map   { background: #ede9fe; }
  .i-people{ background: #dbeafe; }
  .i-bolt  { background: #fef3c7; }
  .text { line-height: 1.05; min-width: 0; }
  .num { font-size: 30px; font-weight: 800; letter-spacing: -0.5px; color: #0f172a; white-space: nowrap; }
  .lbl { margin-top: 6px; font-size: 11.5px; font-weight: 700; letter-spacing: 0.6px; color: #64748b; text-transform: uppercase; white-space: nowrap; }
</style>
</head>
<body>
<div id="row">
  <div class="card">
    <div class="icon i-globe">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <path d="M3 12h18M12 3c2.8 3.2 2.8 14.8 0 18M12 3c-2.8 3.2-2.8 14.8 0 18"/>
      </svg>
    </div>
    <div class="text"><div class="num">9.2B+</div><div class="lbl">Evals / Year</div></div>
  </div>

  <div class="card">
    <div class="icon i-map">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7l6-2 6 2 6-2v14l-6 2-6-2-6 2V7z"/>
        <path d="M9 5v14M15 7v14"/>
      </svg>
    </div>
    <div class="text"><div class="num">185</div><div class="lbl">Countries</div></div>
  </div>

  <div class="card">
    <div class="icon i-people">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="9" r="3"/>
        <circle cx="16" cy="10" r="2.4"/>
        <path d="M3 19c0-3 3-5 6-5s6 2 6 5M14 19c0-2.2 2-3.6 4-3.6s3 1 3 3"/>
        <path d="M11.2 7.2l1.2 1.2 2.2-2.4"/>
      </svg>
    </div>
    <div class="text"><div class="num">95%+</div><div class="lbl">Human Agreement</div></div>
  </div>

  <div class="card">
    <div class="icon i-bolt">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z"/>
      </svg>
    </div>
    <div class="text"><div class="num">&lt;200ms</div><div class="lbl">P99 First Token</div></div>
  </div>
</div>
</body>
</html>
